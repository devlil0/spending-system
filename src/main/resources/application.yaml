spring:
  application:
    name: spending_system

  datasource:
    url: jdbc:postgresql://localhost:5432/${PGDATABASE:spendingsystem}
    username: ${PGUSER}
    password: ${PGPASSWORD}
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: ${PORT:8080}

evolution:
  base-url: ${EVOLUTION_BASE_URL:http://localhost:8081}
  api-key: ${EVOLUTION_API_KEY:}
  instance: ${EVOLUTION_INSTANCE:}
