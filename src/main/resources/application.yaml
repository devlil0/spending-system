spring:
  application:
    name: spending_system

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:spendingsystem}}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: ${PORT:8080}

evolution:
  base-url: ${EVOLUTION_BASE_URL:http://localhost:8081}
  api-key: ${EVOLUTION_API_KEY:}
  instance: ${EVOLUTION_INSTANCE:}

bot:
  allowed-jids: ${BOT_ALLOWED_JIDS:}
  daily-summary-enabled: ${BOT_DAILY_SUMMARY_ENABLED:true}
  daily-summary-cron: ${BOT_DAILY_SUMMARY_CRON:0 0 21 * * *}
  morning-reminder-enabled: ${BOT_MORNING_REMINDER_ENABLED:true}
  morning-reminder-cron: ${BOT_MORNING_REMINDER_CRON:0 0 9 * * *}
